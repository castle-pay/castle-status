name: Set maintenance status

on:
    workflow_dispatch:
        inputs:
            severity:
                description: Severity level (or clear to deactivate the banner)
                required: true
                type: choice
                options:
                    - clear
                    - critical
                    - warning
                    - maintenance

permissions:
    contents: write

jobs:
    update:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Apply status template
              run: |
                  case "${{ inputs.severity }}" in
                    clear) cp templates/inactive.json status.json ;;
                    critical) cp templates/critical.json status.json ;;
                    warning) cp templates/warning.json status.json ;;
                    maintenance) cp templates/maintenance.json status.json ;;
                  esac
                  TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                  jq --arg ts "$TIMESTAMP" '.updatedAt = $ts' status.json > status.tmp
                  mv status.tmp status.json

            - name: Commit and push
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add status.json
                  git diff --staged --quiet && echo "No changes" && exit 0
                  git commit -m "status: ${{ inputs.severity }}"
                  git push
